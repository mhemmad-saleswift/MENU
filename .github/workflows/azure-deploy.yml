name: Build and deploy to Azure Web App - VivaItaliaMenu

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT: src/Restaurant.Web/Restaurant.Web.csproj

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      # Publish ONLY the web project (multi-project repo → a root publish triggers NETSDK1194).
      - name: Publish web project
        run: dotnet publish ${{ env.PROJECT }} -c Release -o "${{ github.workspace }}/publish"

      # Auth via the app's publish profile — no federated identity / client-id needed.
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "VivaItaliaMenu"
          slot-name: "Production"
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ github.workspace }}/publish
